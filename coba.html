
<!DOCTYPE html>
<html lang="en">
<head>
<style>
  body {
    background-color: #0d1117; /* Warna gelap khas crypto */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  h1 {
    font-family: 'Inter', sans-serif; /* Font yang kita bahas sebelumnya */
    color: #00ffcc;
    font-size: 4rem;
    cursor: pointer;
    display: flex;
  }

  /* Kita pecah tiap huruf agar bisa bergerak sendiri-sendiri */
  h1 span {
    display: inline-block;
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
  }

  /* Efek Terbang (Scatter) */
  h1:hover span:nth-child(odd) {
    transform: translate(-20px, -50px) rotate(-20deg) scale(1.2);
    opacity: 0.7;
  }

  h1:hover span:nth-child(even) {
    transform: translate(20px, 50px) rotate(20deg) scale(0.8);
    opacity: 0.5;
  }

  /* Membuat efek glow saat terbang */
  h1:hover span {
    text-shadow: 0 0 20px #00ffcc;
  }
</style>
</head>
<body>

  <h1>
    <span>B</span><span>I</span><span>T</span><span>C</span><span>O</span><span>I</span><span>N</span>
  </h1>

</body>
</html>
